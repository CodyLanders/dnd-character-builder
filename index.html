<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&amp;D 5e Character Generator</title>
    <link rel="stylesheet" href="styles.css?v=build-guidance-panel" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <button class="link-button" id="homeButton" type="button">Restart</button>
        <h1>D&amp;D 5e Character Generator</h1>
      </header>

      <section class="view home-view" id="homeView" aria-labelledby="homeTitle">
        <h2 id="homeTitle">D&amp;D 5e Character Generator</h2>
        <div class="home-actions" aria-label="Character generator actions">
          <button class="primary-button" id="buildButton" type="button">Build a Character</button>
          <button class="primary-button" id="randomizeButton" type="button">Randomize a Character</button>
        </div>
      </section>


      <section class="view hidden randomize-view" id="randomizeView" aria-labelledby="randomizeTitle">
        <h2 id="randomizeTitle">Randomize a Character</h2>
        <div class="home-actions random-ability-options" aria-label="Random character options">
          <button class="primary-button" id="rollCharacterButton" type="button">Roll a Character</button>
          <button class="primary-button" id="standardCharacterButton" type="button">Standard Array Character</button>
          <button class="secondary-button" id="randomizeBackButton" type="button">Back</button>
        </div>
        <div class="random-equipment-prompt hidden" id="randomEquipmentPrompt">
          <h3>Choose Equipment Method</h3>
          <p>Choose how this random character should receive starting gear.</p>
          <div class="equipment-method-grid">
            <button class="equipment-method-card" type="button" data-random-equipment-method="take-equipment">
              <span class="equipment-method-indicator" aria-hidden="true"></span>
              <span>
                <strong>Use Starting Equipment</strong>
                <em>Recommended</em>
                <span>Uses normal class equipment plus background equipment and gold.</span>
              </span>
            </button>
            <button class="equipment-method-card" type="button" data-random-equipment-method="rolled-starting-gold">
              <span class="equipment-method-indicator" aria-hidden="true"></span>
              <span>
                <strong>Roll Starting Gold</strong>
                <em>Advanced</em>
                <span>Rolls class-based starting wealth and skips equipment choices. Equipment must be chosen manually from the Player's Handbook.</span>
              </span>
            </button>
            <button class="secondary-button" id="randomEquipmentBackButton" type="button">Back</button>
          </div>
        </div>
      </section>
      <section class="view hidden" id="buildView" aria-labelledby="buildTitle">
        <div class="view-header">
          <div>
            <p class="section-label">Manual build</p>
            <h2 id="buildTitle">Build Character</h2>
          </div>
        </div>

        <div class="builder-layout">
          <section class="panel wizard-panel" id="wizardStep" aria-live="polite"></section>

          <aside class="panel preview-panel" aria-labelledby="livePreviewTitle">
            <h2 id="livePreviewTitle">Character Preview</h2>
            <div id="livePreview"></div>
          </aside>
        </div>
      </section>

      <section class="view hidden" id="previewView" aria-labelledby="previewTitle">
        <div class="view-header">
          <div>
            <p class="section-label">Randomized starter</p>
            <h2 id="previewTitle">Character Preview</h2>
          </div>
          <button class="secondary-button" id="editRandomButton" type="button">Edit Result</button>
        </div>
        <div class="panel" id="randomPreview"></div>
      </section>
    </main>

    <script src="data/standard-array.js"></script>
    <script src="data/classes.js"></script>
    <script src="data/races.js"></script>
    <script src="data/backgrounds.js"></script>
    <script src="data/finishing.js"></script>
    <script src="data/equipment.js"></script>
    <script src="data/spells.js"></script>
    <script src="data/character-model.js"></script>
    <script src="data/randomizer.js"></script>
    <script src="script.js?v=build-guidance-panel"></script>
  </body>
</html>
